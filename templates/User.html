<!DOCTYPE html>
<html>

<head>
    <title>PizzyPizza - สั่งอาหาร</title>
</head>

<body>
    <h1>🍕 สั่งเลย! PizzyPizza</h1>

    <form action="/order" method="POST">>
        <p>
            <label>เลือกเมนูพิซซ่า:</label>
            <select name="menu_id"> {% for menu in menus %}
                <option value="{{ menu.menu_id }}">{{ menu.menu_name }} - {{ menu.price }} บาท</option>
                {% endfor %}
            </select>
        </p>
        <p>
            <label>จำนวน:</label>
            <input type="number" name="quantity" value="1" min="1">
        </p>
        <button type="submit">ยืนยันการสั่งซื้อ</button>
    </form>
    <hr>

    <table>
        {% for order in orders %}
        <tr>
            <td>{{ order.order_no }}</td>
            <td>{{ order.menu_name }}</td>
            <td>{{ order.subtotal }} บาท</td>
        </tr>
        {% endfor %}
    </table>
</body>

</html>
