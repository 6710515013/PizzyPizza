<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PizzyPizza</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/log_in.css') }}"
    />
    <!-- ลิ้งค์กับ log_in.css -->
</head>
<body>

    <div class="login-container">
        <h2>ระบบสั่งอาหาร <span>PizzyPizza</span></h2>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash-message">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <div class="input-group">
                <label for="username">ชื่อผู้ใช้งาน (Username)</label>
                <input type="text" id="username" name="username" placeholder="กรอกชื่อผู้ใช้งาน" required>
            </div>
            
            <div class="input-group">
                <label for="password">รหัสผ่าน (Password)</label>
                <input type="password" id="password" name="password" placeholder="กรอกรหัสผ่าน" required>
            </div>
            
            <button type="submit" class="login-btn">เข้าสู่ระบบ</button>
        </form>
    </div>

</body>
</html>
